name: Feature request
description: Propose a capability or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Explain the problem before proposing an implementation. Distributed-system features must define failure behavior.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or system problem should this solve?
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Proposed behavior
      description: Describe the API or externally visible behavior.
    validations:
      required: true
  - type: textarea
    id: failures
    attributes:
      label: Failure and retry semantics
      description: What happens during timeout, retry, leader change, restart, or partial failure?
    validations:
      required: true
  - type: textarea
    id: kura
    attributes:
      label: Kura Engine relevance
      description: If applicable, explain how Kura Engine would use this capability.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What observable tests would prove this feature complete?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and tradeoffs
      description: What simpler options or existing systems were considered?
