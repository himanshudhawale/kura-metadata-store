name: Bug report
description: Report incorrect or unexpected behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Follow SECURITY.md instead.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: Commit SHA or release
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the smallest deterministic sequence of operations.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Compiler version, standard library, operating system, node count, and relevant configuration.
    validations:
      required: true
  - type: textarea
    id: failure
    attributes:
      label: Failure conditions
      description: Note retries, restarts, network faults, or concurrent operations.
